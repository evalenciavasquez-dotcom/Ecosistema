<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ ECOSISTEMA EDUARDO - EN VIVO</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--s1:#0a0a0a;--txt:#fff;--muted:#666;--g:#00ff88;--r:#ff3333;--a:#ffaa00;--b:#00aaff;--pk:#ff4488;--gw:0 0 20px rgba(0,255,136,0.6);--rw:0 0 20px rgba(255,51,51,0.6);--aw:0 0 20px rgba(255,170,0,0.6);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'Unbounded',sans-serif;height:100vh;overflow:hidden;}
.container{display:grid;grid-template-rows:60px 1fr 60px;height:100vh;}
.header{display:flex;justify-content:space-between;align-items:center;padding:0 20px;background:var(--s1);border-bottom:2px solid var(--g);box-shadow:var(--gw);}
.time{font-family:'Space Mono',monospace;font-size:28px;color:var(--g);text-shadow:var(--gw);}
.header-label{font-size:8px;color:var(--muted);letter-spacing:.3em;text-transform:uppercase;}
.main{overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:15px;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:var(--g);border-radius:2px;}
.card{background:linear-gradient(135deg,rgba(0,255,136,.05) 0%,rgba(0,170,255,.05) 100%);border:2px solid var(--g);border-radius:12px;padding:16px;box-shadow:var(--gw);}
.card.p1{border-color:var(--r);box-shadow:var(--rw);}
.card.p2{border-color:var(--a);box-shadow:var(--aw);}
.card-title{font-size:13px;font-weight:900;margin-bottom:8px;display:flex;gap:6px;align-items:center;}
.card-desc{font-size:10px;color:var(--muted);line-height:1.6;margin-bottom:6px;}
.card-meta{font-size:8px;color:var(--muted);display:flex;gap:10px;margin-top:8px;}
.badge{display:inline-block;padding:2px 8px;background:rgba(0,255,136,.1);border:1px solid var(--g);border-radius:4px;font-size:7px;font-weight:700;color:var(--g);}
.badge.r1{background:rgba(255,51,51,.1);border-color:var(--r);color:var(--r);}
.footer{display:flex;gap:10px;background:var(--s1);padding:12px 20px;border-top:2px solid var(--g);font-size:8px;color:var(--muted);}
.stat{text-align:center;flex:1;}
.stat-val{font-family:'Space Mono',monospace;font-size:18px;font-weight:900;color:var(--g);}
.stat-label{font-size:7px;margin-top:3px;}
.emoji{display:inline-block;margin-right:4px;}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div>
    <div class="header-label">⚡ EN VIVO</div>
    <div class="time" id="time">00:00:00</div>
  </div>
  <div style="text-align:right;">
    <div class="header-label">TAREAS HOY / VENCIDAS</div>
    <div style="font-size:24px;font-weight:900;color:var(--a);text-shadow:var(--aw);" id="taskCount">15</div>
  </div>
</div>

<div class="main" id="tasksContainer">
  <div style="text-align:center;padding:40px;color:var(--muted);">Cargando tareas en vivo...</div>
</div>

<div class="footer">
  <div class="stat">
    <div class="stat-label">Ingresos mayo</div>
    <div class="stat-val" style="color:var(--g);">$4.93M</div>
  </div>
  <div class="stat">
    <div class="stat-label">Gastos fijos</div>
    <div class="stat-val" style="color:var(--r);">$3.85M</div>
  </div>
  <div class="stat">
    <div class="stat-label">Excedente</div>
    <div class="stat-val" style="color:var(--a);">$1.08M</div>
  </div>
  <div class="stat">
    <div class="stat-label">P1 activas</div>
    <div class="stat-val" style="color:var(--pk);" id="p1count">—</div>
  </div>
</div>
</div>

<script>
const TASKS = [
  {id:1,emoji:"📊",title:"MONEYFY: Exportar CSV",priority:"p2",date:"Hoy",desc:"Exportar datos Moneyfy"},
  {id:2,emoji:"🎵",title:"CUESTIONARIO: Música/Startups",priority:"p2",date:"Hoy",desc:"15-20 preguntas. Rotan temas"},
  {id:3,emoji:"👁️",title:"SEGUIMIENTO DOBLE AA",priority:"p2",date:"Hoy",desc:"Revisar avance y métricas"},
  {id:4,emoji:"📋",title:"REVISAR: Pagos semana",priority:"p2",date:"Hoy",desc:"Agua, internet, baile, colegio"},
  {id:5,emoji:"🎵",title:"GIULIA - Contactar Virgin Grammy",priority:"p1",date:"VENCIDA",desc:"Inscripción Grammy + documento"},
  {id:6,emoji:"🎵",title:"GIULIA - Detalles lanzamiento 29 mayo",priority:"p1",date:"VENCIDA",desc:"Organizar operativos go-live"},
  {id:7,emoji:"💰",title:"FINANZAS - Revisar pagos",priority:"p2",date:"VENCIDA",desc:"Estado de pagos fijos"},
  {id:8,emoji:"📊",title:"DOBLE AA - Análisis métricas",priority:"p2",date:"Ayer",desc:"YouTube/Spotify stats"},
  {id:9,emoji:"📋",title:"ANDY G - Licencia Totoy",priority:"p2",date:"Ayer",desc:"Formalizar vía Farolatino"},
  {id:10,emoji:"📋",title:"ZEIWA - Enviar NDA a Alejo",priority:"p2",date:"Ayer",desc:"NDA nuevo para manager"},
  {id:11,emoji:"📋",title:"RAYO Y TOBI - Virgin/Guillermo",priority:"p2",date:"Ayer",desc:"Destrabar con Virgin"},
  {id:12,emoji:"📋",title:"PROYECTOS - L'OMY/Music Labs/Hamurabi",priority:"p2",date:"Ayer",desc:"Revisar estado real"},
  {id:13,emoji:"📞",title:"PUSH JUAN MAGAN - Taganga/HOKAI",priority:"p1",date:"Hoy",desc:"WhatsApp O email HOY"},
  {id:14,emoji:"📞",title:"PUSH MARCEL SELVA - Clipper's",priority:"p1",date:"VENCIDA",desc:"TORTTURA feedback + HOKAI"},
  {id:15,emoji:"📞",title:"PUSH JUAN MAGAN - Seguimiento",priority:"p1",date:"Hoy",desc:"Respuesta correo 21 mayo"}
];

function renderTasks(){
  const p1 = TASKS.filter(t=>t.priority==='p1').length;
  document.getElementById('p1count').textContent = p1;
  
  const html = TASKS.map(t => `
    <div class="card ${t.priority}">
      <div class="card-title">
        <span class="emoji">${t.emoji}</span>
        <span>${t.title}</span>
      </div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-meta">
        <span class="badge ${t.priority==='p1'?'r1':''}">P${t.priority==='p1'?'1':'2'}</span>
        <span>${t.date}</span>
      </div>
    </div>
  `).join('');
  
  document.getElementById('tasksContainer').innerHTML = html;
}

function updateTime(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('time').textContent = `${h}:${m}:${s}`;
}

renderTasks();
updateTime();
setInterval(updateTime, 1000);
</script>
</body>
</html>
